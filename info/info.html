<html lang="de">
    
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EventHelper Infoseite</title>
        <link rel="stylesheet" href="../style.css">

    </head>

    <body>

        <header class="header">
            <h1>EventHelper - Infoseite</h1>
        </header>
    
        <main class="container">

            <section class="glass-card">
                <h2>Deine Schule ist noch kein Mitglied?</h2>
                <label>will es aber sein?</label>
                <label>Dann melde dich bei den Administratoren unter <a href="mailto:info@eventhelper.de" target="_blank">NEED MAIL ADDRESS</a></label>
                <br>
                <label>oder erstelle hier ein ticket damit wir wissen dass du interesse hast und uns melden könen</label>
                <br>
                <input id="info-school-name" class="input" type="text" placeholder="Name der Schule">
                <input id="info-contact-info" class="input" type="text" placeholder="Kontaktinformation (E-Mail)">
                <textarea id="info-message" class="input" type="text" rows="4" placeholder="Nachricht (optional)"></textarea>
                <br>
                <button id="info-new-ticket" class="btn">Ticket erstellen</button>
            </section>

        </main>

        <footer class="footer">
            <p>&copy; 2026 EventHelper project visit <a href="https://github.com/LordVoldemortGames/Event-Helper" target="_blank">EventHelper on GitHub</a> for more information</p>
        </footer>        <script src="info.js"></script>
    </body>

</html>
