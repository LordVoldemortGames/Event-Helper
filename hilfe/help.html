<html lang="de">
    
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EventHelper Hilfe</title>
        <link rel="stylesheet" href="../style.css">

    </head>

    <body>

        <header class="header">
            <h1>EventHelper - HILFE</h1>
        </header>
    
        <main class="container">

            <section class="glass-card">
                <h2>Du Benötigst Hilfe?</h2>
                <label>weil etwas kaputt ist?</label>
                <br>
                <label>dann erstelle hier ein ticket damit wir wissen dass ihr hilfe braucht und wir uns bei euch melden könen</label>
                <br>
                <input id="help-school-name" class="input" type="text" placeholder="Name der Schule">
                <input id="help-contact-info" class="input" type="text" placeholder="Kontaktinformation (E-Mail)">
                <textarea id="help-message" class="input" type="text" rows="4" placeholder="Nachricht (beschreibe was los ist)"></textarea>
                <br>
                <button id="help-new-ticket" class="btn">Ticket erstellen</button>
            </section>

        </main>

        <footer class="footer">
            <p>&copy; 2026 EventHelper project visit <a href="https://github.com/LordVoldemortGames/Event-Helper" target="_blank">EventHelper on GitHub</a> for more information</p>
        </footer>
        <script src="help.js"></script>
    </body>

</html>
