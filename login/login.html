<html lang="de">
    
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EventHelper Login</title>
        <link rel="stylesheet" href="../style.css">

    </head>

    <body>

        <header class="header">
            <h1>EventHelper - Login</h1>
        </header>
    
        <main class="container">

            <section class="glass-card">
                <h2>Einloggen</h2>
                <br>
                <input id="login-username" class="input" type="text" placeholder="Benutzername">
                <input id="login-password" class="input" type="password" placeholder="Passwort">
                <br>
                <label>der Benutzername wird automatisch generiert</label>
                <label>und steht unter der Registrierung</label>
                <br>
                <button id="login-button" type="button" class="btn">Einloggen</button>
            </section>

            <section class="glass-card">
                <h1 id="warn-login" class="warn"></h1>
                <h2>Deine Schule ist noch kein Mitglied?</h2>
                <label>will es aber sein?</label>
                <label>Dann besuche mal <a href="../info/info.html" target="_blank">die Infoseite</a> und melde dich bei den Administratoren</label>
            </section>

            <section class="glass-card">
                <h2>Registrieren</h2>
                <br>
                <input id="register-firstname" class="input" type="text" placeholder="Vorname">
                <input id="register-lastname" class="input" type="text" placeholder="Nachname">
                <input id="register-password" class="input" type="password" placeholder="Passwort">
                <input id="register-schoolpin" class="input" type="number" placeholder="SchulPin" maxlength="6">
                <br>
                <p>Benutzername: <label id="register-username">___</label></p>
                <br>
                <button id="register-button" class="btn">Registrieren</button>
            </section>

        </main>

        <footer class="footer">
            <p>&copy; 2026 EventHelper project visit <a href="https://github.com/LordVoldemortGames/Event-Helper" target="_blank">EventHelper on GitHub</a> for more information</p>
        </footer>

    </body>

    <script src="login.js"></script>

</html>
