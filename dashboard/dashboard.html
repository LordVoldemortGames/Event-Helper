<html lang="de">
   
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EventHelper Dashboard</title>
        <link rel="stylesheet" href="../style.css">

    </head>

    <body>

        <header class="header">
            <h1>EventHelper Dashboard - <label id="school-name">___</label></h1>
        </header>
    
        <main class="container">

            <section class="glass-card"> 
                    <header class="card-header">
                        <h2>Aktuelle Projekte</h2>
                        <button id="dash-new-project" class="btn">+</button>
                    </header>
                
            </section>

            <section class="glass-card"> 
                <header class="card-header">
                    <h2>Aktuelle Aufgaben</h2>
                    <button id="dash-new-task" class="btn">+</button>
                </header>

            </section>

            <section class="glass-card material-list-section">

                <header class="card-header">
                    <h2>Materialliste</h2>
                    <button id="dash-add-material" class="btn">+</button>
                </header>
                
                <div class="material-table-wrapper">
                <table id="dash-material-table" class="material-table">
                    <thead>
                        <tr>
                            <th>Modell</th>
                            <th>Marke</th>
                            <th>Inventarnummer</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="dash-material-list">
                        <!-- Materialien werden hier dynamisch eingefügt -->
                    </tbody>
                </table>
                <p class="material-hint" style="font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-top: 0.5rem; text-align: center;">
                    Klick auf Zeile zum Bearbeiten • Rechtsklick zum Löschen
                </p>
                </div>
            </section>
            
        </main>

        <!-- Material Modal -->
        <div id="dash-material-modal" class="material-modal hidden" aria-hidden="true">
            <div class="material-modal-content">
                <button id="dash-material-modal-close" class="btn material-close">×</button>
                <h3 id="dash-material-modal-title">Material bearbeiten</h3>
                
                <div class="modal-form-group">
                    <label for="dash-modal-material-model">Modell:</label>
                    <input type="text" id="dash-modal-material-model" required>
                </div>
                
                <div class="modal-form-group">
                    <label for="dash-modal-material-brand">Marke:</label>
                    <input type="text" id="dash-modal-material-brand" required>
                </div>
                
                <div class="modal-form-group">
                    <label for="dash-modal-material-inventory">Inventarnummer:</label>
                    <input type="text" id="dash-modal-material-inventory" required>
                </div>
                
                <div class="modal-form-group">
                    <label for="dash-modal-material-status">Status:</label>
                    <select id="dash-modal-material-status" required>
                        <option value="">Status wählen</option>
                        <option value="verfügbar">Verfügbar</option>
                        <option value="ausgeliehen">Ausgeliehen</option>
                        <option value="defekt">Defekt</option>
                        <option value="wartung">In Wartung</option>
                    </select>
                </div>

                <div class="modal-form-group">
                    <label for="dash-modal-material-class">Kategorie:</label>
                    <input type="text" id="dash-modal-material-class" required placeholder="z.B. Kamera, Mikrofon, etc.">
                </div>

                <div class="modal-form-group">
                    <label for="dash-modal-material-notes">Notizen:</label>
                    <textarea id="dash-modal-material-notes" rows="3" placeholder="Optionale Notizen"></textarea>
                </div>

                <div class="modal-buttons">
                    <button id="dash-material-modal-save" class="btn">Speichern</button>
                    <button id="dash-material-modal-delete" class="btn btnev">Löschen</button>
                    <button id="dash-material-modal-cancel" class="btn">Abbrechen</button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>&copy; 2026 EventHelper project visit <a href="https://github.com/LordVoldemortGames/Event-Helper" target="_blank">EventHelper on GitHub</a> for more information</p>
            <a class='a' href="../hilfe/help.html" target="_blank">HILFE</a>
        </footer>

    </body>

    <script src="dashboard.js"></script>

</html>
