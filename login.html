<html lang="de">
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EventHelper Login</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js"></script>

    </head>

    <body>

        <header class="header">
            <h1>EventHelper - Login</h1>
        </header>
    
        <main class="container">

            <section class="glass-card">
                <input id="username-login" class="input" type="text" placeholder="Benutzername">
                <input id="password-login" class="input" type="password" placeholder="Passwort">
                <br>
                <label>der Benutzername wird automatisch generiert</label>
                <label>und steht unter der Registrierung</label>
                <br>
                <button class="btn">Einloggen</button>
            </section>

            <section class="glass-card">
                <input id="firstname-register" class="input" type="text" placeholder="Vorname">
                <input id="lastname-register" class="input" type="text" placeholder="Nachname">
                <input id="password-register" class="input" type="password" placeholder="Passwort">
                <input id="schoolpin-register" class="input" type="number" placeholder="SchulPin">
                <br>
                <p>Benutzername: <label id="username-display">___</label></p>
                <br>
                <button class="btn">Registrieren</button>
            </section>

        </main>

        <footer class="footer">
            <p>&copy; 2026 EventHelper project visit <a href="https://github.com/LordVoldemortGames/Event-Helper" target="_blank">EventHelper on GitHub</a> for more information</p>
        </footer>

    </body>

    <script src="username.js"></script>

</html>
