<html lang="de">
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Event Helper Prototyp</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js"></script>

    </head>

    <body>

        <header class="header">
            <h1>Event Helper - Login</h1>
        </header>
    
        <main class="container">

            <section class="card">
                <h2>Login</h2>
                <p>Bitte logge dich ein</p>
                <input class="input" type="text" id="usernamemail" placeholder="Benutzername oder E-Mail">
                <input class="input" type="password" id="password" placeholder="Passwort">
                <button class="btn" id="loginbtn">Login</button>
                <p>du musst dich einloggen &uArr;</p>
            </section>

            <section class="card">
                <h2>Kein Konto?</h2>
                <p>Bitte Registriere dich</p>
                <input class="input" type="text" id="username" placeholder="Benutzername">
                <input class="input" type="password" id="password" placeholder="Passwort">
                <button class="btn" id="registerbtn">Registrieren</button>
                <p>du musst dich registrieren &uArr;</p>
            </section>

        </main>

    </body>

</html>
