<html lang="de">
   
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EventHelper Adminboard</title>
        <link rel="stylesheet" href="../style.css">

    </head>

    <body>

        <header class="header">
            <h1>EventHelper Adminboard</h1>
        </header>
    
        <main class="container">

            <section class="glass-card">
                    <header class="card-header">
                        <h2>Alle Schulen</h2>
                        <button class="btn">+</button>
                    </header>
                
            </section>

            <section class="glass-card">
                <header class="card-header">
                    <h2>Aktuelle Aufgaben</h2>
                    <button class="btn">+</button>
                </header>

            </section>

            <section class="glass-card">
                <header class="card-header">
                    <h2>Neue Anfragen <span id="ticket-counter-value" class="ticket-counter"></span></h2>
                    <div class="admin-action-buttons">
                        <button id="new-ticket-admin" class="btn">+ Ticket</button>
                        <button id="reset-ticket-counter" class="btn btnev">Counter zurücksetzen</button>
                    </div>
                </header>
                <div id="ticket-list" class="ticket-list"></div>
            </section>
        </main>

        <div id="ticket-detail-modal" class="ticket-modal hidden" aria-hidden="true">
            <div class="ticket-modal-content">
                <button id="ticket-modal-close" class="btn ticket-close">Schließen</button>
                <h2 id="modal-ticket-number">Ticket</h2>
                <div class="ticket-detail-grid">
                    <div>
                        <label>Schulname</label>
                        <input id="modal-school-name" readonly>
                    </div>
                    <div>
                        <label>Kontakt</label>
                        <input id="modal-contact-info" readonly>
                    </div>
                    <div>
                        <label>Erstellt am</label>
                        <input id="modal-created-at" readonly>
                    </div>
                    <div>
                        <label>Quelle</label>
                        <input id="modal-source" readonly>
                    </div>
                </div>
                <div class="ticket-section">
                    <label>Nachricht</label>
                    <textarea id="modal-message" readonly rows="4"></textarea>
                </div>
                <div class="ticket-section">
                    <label>Status</label>
                    <select id="modal-status">
                        <option value="offen">offen</option>
                        <option value="in Bearbeitung">in Bearbeitung</option>
                        <option value="geschlossen">geschlossen</option>
                    </select>
                </div>
                <div class="ticket-section">
                    <label>Dringlichkeit</label>
                    <select id="modal-urgency">
                        <option value="niedrig">niedrig</option>
                        <option value="normal">normal</option>
                        <option value="hoch">hoch</option>
                    </select>
                </div>
                <div class="ticket-section">
                    <label>Admin-Notiz</label>
                    <textarea id="modal-note" rows="4" placeholder="Notizen hier eingeben..."></textarea>
                </div>
                <div class="ticket-actions">
                    <button id="ticket-save" class="btn">Speichern</button>
                    <button id="ticket-delete" class="btn btnev">Ticket löschen</button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>&copy; 2026 EventHelper project visit <a href="https://github.com/LordVoldemortGames/Event-Helper" target="_blank">EventHelper on GitHub</a> for more information</p>
        </footer>
        <script src="../info/info.js"></script>

    </body>
</html>
