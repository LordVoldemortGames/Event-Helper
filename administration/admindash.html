<html lang="de">
   
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EventHelper Adminboard</title>
        <link rel="stylesheet" href="../style.css">

    </head>

    <body>

        <header class="header">
            <h1>EventHelper Adminboard</h1>
        </header>
    
        <main class="container">

            <section class="glass-card">
                    <header class="card-header">
                        <h2>Alle Schulen</h2>
                        <button id="admin-new-school" class="btn">+</button>
                    </header>
                    <div id="admin-school-list" class="ticket-list" style="margin-top:1rem;"></div>
            </section>

            <section class="glass-card">
                <header class="card-header">
                    <h2>Aktuelle Aufgaben</h2>
                    <button id="admin-new-task" class="btn">+</button>
                </header>

            </section>

            <section class="glass-card">
                <header class="card-header">
                    <h2>Neue Anfragen <span id="ticket-counter-value" class="ticket-counter"></span></h2>
                    <div class="admin-action-buttons">
                        <button id="admin-new-ticket" class="btn">+ Ticket</button>
                        <button id="admin-reset-ticket-counter" class="btn btnev">Counter zurücksetzen</button>
                    </div>
                </header>
                <div id="admin-ticket-list" class="ticket-list"></div>
            </section>
        </main>

        <div id="admin-ticket-detail-modal" class="ticket-modal hidden" aria-hidden="true">
            <div class="ticket-modal-content">
                <button id="admin-ticket-modal-close" class="btn ticket-close">Schließen</button>
                <h2 id="admin-modal-ticket-number">Ticket</h2>
                <div class="ticket-detail-grid">
                    <div>
                        <label>Schulname</label>
                        <input id="admin-modal-school-name" readonly>
                    </div>
                    <div>
                        <label>Kontakt</label>
                        <input id="admin-modal-contact-info" readonly>
                    </div>
                    <div>
                        <label>Erstellt am</label>
                        <input id="admin-modal-created-at" readonly>
                    </div>
                    <div>
                        <label>Quelle</label>
                        <input id="admin-modal-source" readonly>
                    </div>
                </div>
                <div class="ticket-section">
                    <label>Nachricht</label>
                    <textarea id="admin-modal-message" readonly rows="4"></textarea>
                </div>
                <div class="ticket-section">
                    <label>Status</label>
                    <select id="admin-modal-status">
                        <option value="offen">offen</option>
                        <option value="in Bearbeitung">in Bearbeitung</option>
                        <option value="geschlossen">geschlossen</option>
                    </select>
                </div>
                <div class="ticket-section">
                    <label>Dringlichkeit</label>
                    <select id="admin-modal-urgency">
                        <option value="niedrig">niedrig</option>
                        <option value="normal">normal</option>
                        <option value="hoch">hoch</option>
                    </select>
                </div>
                <div class="ticket-section">
                    <label>Admin-Notiz</label>
                    <textarea id="admin-modal-note" rows="4" placeholder="Notizen hier eingeben..."></textarea>
                </div>
                <div class="ticket-actions">
                    <button id="admin-ticket-save" class="btn">Speichern</button>
                    <button id="admin-ticket-delete" class="btn btnev">Ticket löschen</button>
                </div>
            </div>
        </div>

        <div id="admin-schools-detail" class="ticket-modal hidden" aria-hidden="true">
            <div class="ticket-modal-content">
                <button id="admin-schools-modal-close" class="btn ticket-close">Schließen</button>
                <h2 id="admin-schools-modal-title">Neue Schule anlegen</h2>
                <div class="ticket-detail-grid">
                    <div>
                        <label for="admin-school-name">Schulname</label>
                        <input id="admin-school-name" type="text" placeholder="Schulname">
                    </div>
                    <div>
                        <label for="admin-school-location">Ort</label>
                        <input id="admin-school-location" type="text" placeholder="Ort">
                    </div>
                    <div>
                        <label for="admin-school-pin">SchulPIN</label>
                        <input id="admin-school-pin" type="text" maxlength="6" placeholder="6-stellige PIN">
                    </div>
                </div>
                <div class="ticket-section">
                    <label for="admin-school-notes">Notizen</label>
                    <textarea id="admin-school-notes" rows="4" placeholder="Notizen zur Schule"></textarea>
                </div>
                <div id="admin-school-error" class="warn" style="display:none; margin-bottom:1rem;"></div>
                <div class="ticket-actions">
                    <button id="admin-school-save" class="btn">Speichern</button>
                    <button id="admin-school-delete" class="btn btnev">Löschen</button>
                    <button id="admin-school-cancel" class="btn btnev">Abbrechen</button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>&copy; 2026 EventHelper project visit <a href="https://github.com/LordVoldemortGames/Event-Helper" target="_blank">EventHelper on GitHub</a> for more information</p>
        </footer>
        <script src="../info/info.js"></script>
        <script src="admindash.js"></script>

    </body>
</html>
